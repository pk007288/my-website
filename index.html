/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
}

.cover {

  background: white;
}

/* NAME + BIO */

  font-size: 28px;
}

.profile-box p {

}

}

  margin: 5px;
  padding: 10px 15px;
  background: #1877f2;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 10px;
}

.gallery img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
}
</style>
</head>
